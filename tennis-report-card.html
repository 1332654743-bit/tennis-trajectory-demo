<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>发球动作轨迹</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'PingFang SC', sans-serif; background: #f5f5f5; }

.page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

.report-card {
  width: 100%; max-width: 380px; background: #fff; border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.1); overflow: hidden;
}

/* Header */
.card-header {
  display: flex; align-items: center; padding: 16px 16px 12px; gap: 10px;
}
.card-header .icon {
  width: 32px; height: 32px; border-radius: 50%; background: #e8f5e9;
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.card-header .title { font-size: 16px; font-weight: 600; color: #222; flex: 1; }
.card-header .info-icon { color: #bbb; font-size: 18px; cursor: pointer; }

/* Speed overlay inside 3D */
.speed-overlay {
  position: absolute; top: 14px; left: 14px; pointer-events: none; z-index: 2;
}
.speed-overlay .value { font-size: 36px; font-weight: 800; color: #4caf50; line-height: 1; }
.speed-overlay .unit { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 600; margin-left: 2px; }
.speed-overlay .label { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* 3D Area */
.card-3d-wrap {
  position: relative; width: 100%; height: 280px; background: #0a1e2e; overflow: hidden;
}
#three-canvas { width: 100%; height: 100%; display: block; }

.card-legend {
  position: absolute; bottom: 10px; right: 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.card-legend .legend-item {
  display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.7);
}
.card-legend .dot { width: 8px; height: 8px; border-radius: 50%; }
.card-legend .dot-green { background: #4caf50; }
.card-legend .dot-yellow { background: #ccff00; }

/* Control Panel (outside card — debug tool) */
.control-panel {
  width: 100%; max-width: 380px; margin-top: 16px;
  background: #fff; border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.panel-title {
  font-size: 11px; color: #aaa; font-weight: 600; margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.panel-row {
  display: flex; align-items: center; padding: 8px 0; gap: 12px;
}
.panel-row:not(:last-child) { border-bottom: 1px solid #f5f5f5; }
.panel-label {
  font-size: 12px; color: #888; width: 56px; flex-shrink: 0;
}
.panel-btns {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.panel-btns button {
  padding: 5px 12px; font-size: 11px; border: 1px solid #e0e0e0; cursor: pointer;
  color: #666; background: #fafafa; border-radius: 14px; transition: all 0.2s;
}
.panel-btns button.active { background: #222; color: #fff; border-color: #222; }

/* Playbar */
.card-playbar {
  display: flex; align-items: center; padding: 12px 16px; gap: 12px; background: #fafafa;
}
.play-btn {
  width: 32px; height: 32px; border-radius: 50%; background: #222;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none; flex-shrink: 0;
}
.play-btn::after { content: '▶'; color: #fff; font-size: 11px; margin-left: 2px; }
.play-btn.playing::after { content: '⏸'; margin-left: 0; }
.playbar-time { font-size: 12px; color: #999; margin-left: auto; }
.playbar-progress { flex: 1; height: 4px; background: #e0e0e0; border-radius: 2px; position: relative; cursor: pointer; touch-action: none; }
.playbar-fill { position: absolute; left: 0; top: 0; height: 100%; background: #4caf50; border-radius: 2px; width: 0%; pointer-events: none; }
.playbar-thumb {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 12px; height: 12px; border-radius: 50%; background: #4caf50;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3); pointer-events: none; left: 0%;
}
.rate-btn {
  padding: 3px 8px; border-radius: 10px; background: #eee; border: none;
  font-size: 11px; color: #555; cursor: pointer; font-weight: 600; flex-shrink: 0;
}
</style>
</head>

  <div class="report-card">
    <!-- Header -->
    <div class="card-header">

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ State ============
let isPlaying = false;
let animProgress = 0;
let isDragging = false;
let playbackRate = 1; // 倍速
const ANIM_DURATION = 4000; // 4 seconds at 1x
let lastTime = 0;

// ============ Three.js Init ============
let renderer, scene, camera, controls, hitMarker;
let wristCurve, sceneCenter, hitPoint;

const canvas = document.getElementById('three-canvas');
renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x0a1e2e);

scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(55, canvas.clientWidth / canvas.clientHeight, 0.01, 50);

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dl = new THREE.DirectionalLight(0xffffff, 0.9);
dl.position.set(2, 4, 2);
scene.add(dl);

// ============ Court ============
const courtGroup = new THREE.Group();
scene.add(courtGroup);

function buildCourt() {
  const S = 0.33;
  const halfLen = 11.89 * S;
  const singleW = 8.23 * S / 2;
  const doubleW = 10.97 * S / 2;
  const serviceLen = 6.4 * S;
  const netH = 0.914 * S;
  const baselineZ = 0.6;
  const netZ = baselineZ + halfLen;
  const serviceZ = netZ - serviceLen;

  const courtGeo = new THREE.PlaneGeometry(doubleW * 2 + 1, halfLen + 2);
  const courtMat = new THREE.MeshLambertMaterial({ color: 0x0f2e3d });
  const court = new THREE.Mesh(courtGeo, courtMat);
  court.rotation.x = -Math.PI / 2;
  court.position.set(0, -0.01, baselineZ + halfLen / 2);
  courtGroup.add(court);

  const outerGeo = new THREE.PlaneGeometry(doubleW * 2 + 4, halfLen + 8);
  const outerMat = new THREE.MeshLambertMaterial({ color: 0x091a24 });
  const outer = new THREE.Mesh(outerGeo, outerMat);
  outer.rotation.x = -Math.PI / 2;
  outer.position.set(0, -0.02, baselineZ + halfLen / 2 - 2);
  courtGroup.add(outer);

  const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
  const LINE_W = 0.02;

  function addLine(x1, z1, x2, z2) {
    const dx = x2 - x1, dz = z2 - z1;
    const len = Math.sqrt(dx * dx + dz * dz);
    const geo = new THREE.PlaneGeometry(LINE_W, len);
    const mesh = new THREE.Mesh(geo, lineMat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.rotation.z = -Math.atan2(dx, dz);
    mesh.position.set((x1 + x2) / 2, 0.001, (z1 + z2) / 2);
    courtGroup.add(mesh);
  }

  addLine(-doubleW, baselineZ, doubleW, baselineZ);
  addLine(-doubleW, baselineZ, -doubleW, netZ);
  addLine(doubleW, baselineZ, doubleW, netZ);
  addLine(-singleW, baselineZ, -singleW, netZ);
  addLine(singleW, baselineZ, singleW, netZ);
  addLine(-singleW, serviceZ, singleW, serviceZ);
  addLine(0, serviceZ, 0, netZ);
  addLine(0, baselineZ - 0.1, 0, baselineZ);

  const netGeo = new THREE.PlaneGeometry(doubleW * 2 + 0.3, netH);
  const netMat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
  const netMesh = new THREE.Mesh(netGeo, netMat);
  netMesh.position.set(0, netH / 2, netZ);
  courtGroup.add(netMesh);

  const topLineGeo = new THREE.PlaneGeometry(doubleW * 2 + 0.3, 0.015);
  const topLineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
  const topLineMesh = new THREE.Mesh(topLineGeo, topLineMat);
  topLineMesh.position.set(0, netH, netZ);
  courtGroup.add(topLineMesh);

  const postGeo = new THREE.CylinderGeometry(0.02, 0.02, netH + 0.08, 8);
  const postMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
  const postL = new THREE.Mesh(postGeo, postMat);
  postL.position.set(-doubleW - 0.15, (netH + 0.08) / 2, netZ);
  courtGroup.add(postL);
  const postR = new THREE.Mesh(postGeo, postMat);
  postR.position.set(doubleW + 0.15, (netH + 0.08) / 2, netZ);
  courtGroup.add(postR);
}

buildCourt();

// ============ Trajectory ============
const points = [
  new THREE.Vector3(-0.25, 0.0, -0.2),
  new THREE.Vector3(-0.15, 0.54, -0.3),
  new THREE.Vector3(0.0, 1.14, -0.15),
  new THREE.Vector3(0.15, 1.49, 0.05),
  new THREE.Vector3(0.05, 1.64, 0.15),
  new THREE.Vector3(0.35, 1.14, 0.35),
  new THREE.Vector3(0.55, 0.44, 0.5),
];
wristCurve = new THREE.CatmullRomCurve3(points);
const curvePoints = wristCurve.getPoints(100);
sceneCenter = new THREE.Vector3();
curvePoints.forEach(p => sceneCenter.add(p));
sceneCenter.divideScalar(curvePoints.length);

// Hit point
const hitTarget = new THREE.Vector3(0.05, 1.64, 0.15);
let hitParamT = 0.57;
let minDist = Infinity;
for (let i = 0; i <= 500; i++) {
  const t = i / 500;
  const pt = wristCurve.getPointAt(t);
  const d = pt.distanceTo(hitTarget);
  if (d < minDist) { minDist = d; hitParamT = t; }
}
hitPoint = wristCurve.getPointAt(hitParamT);

// Shell (always visible, dim)
const shellGeo = new THREE.TubeGeometry(wristCurve, 80, 0.025, 12, false);
const shellMat = new THREE.MeshLambertMaterial({ color: 0x888888, transparent: true, opacity: 0.2, depthWrite: false });
const shellMesh = new THREE.Mesh(shellGeo, shellMat);
shellMesh.renderOrder = 0;
scene.add(shellMesh);

// Colored fill tube (shader with uProgress)
const fillGeo = new THREE.TubeGeometry(wristCurve, 80, 0.022, 12, false);
const segCount = 80, radialCount = 12, vertsPerRing = radialCount + 1;
const tValues = new Float32Array(fillGeo.attributes.position.count);
for (let seg = 0; seg <= segCount; seg++) {
  const t = seg / segCount;
  for (let v = 0; v < vertsPerRing; v++) {
    tValues[seg * vertsPerRing + v] = t;
  }
}
fillGeo.setAttribute('aT', new THREE.Float32BufferAttribute(tValues, 1));

const fillMat = new THREE.ShaderMaterial({
  uniforms: { uProgress: { value: 1.0 } },
  vertexShader: `
    attribute float aT;
    varying float vT;
    void main() {
      vT = aT;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uProgress;
    varying float vT;
    void main() {
      if (vT > uProgress) discard;
      float speed = exp(-pow(vT - 0.57, 2.0) / 0.08);
      vec3 color;
      if (speed < 0.5) {
        float s = speed / 0.5;
        color = vec3(s, 0.75 + s * 0.15, 0.2 * (1.0 - s));
      } else {
        float s = (speed - 0.5) / 0.5;
        color = vec3(1.0, 0.9 - s * 0.7, 0.0);
      }
      gl_FragColor = vec4(color, 0.95);
    }
  `,
  transparent: true, side: THREE.DoubleSide, depthTest: true, depthWrite: true
});
const fillMesh = new THREE.Mesh(fillGeo, fillMat);
fillMesh.renderOrder = 1;
scene.add(fillMesh);

// ============ Ribbon (绸带) Trajectory ============
// Flat ribbon that twists along the curve following racket face angle
function buildRibbonGeometry(curve, segments, halfWidth) {
  const positions = [];
  const tAttrs = [];
  const indices = [];

  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const point = curve.getPointAt(t);
    const tangent = curve.getTangentAt(t).normalize();

    // Ribbon normal rotates to simulate racket face angle change
    // Twist: starts flat horizontal, rotates through swing, peaks at hit
    const twistAngle = Math.PI * 0.3 * Math.sin(t * Math.PI * 1.5) + t * Math.PI * 0.8;

    // Compute a reference "up" then rotate around tangent
    let up = new THREE.Vector3(0, 1, 0);
    if (Math.abs(tangent.dot(up)) > 0.99) up = new THREE.Vector3(1, 0, 0);
    const binormal = new THREE.Vector3().crossVectors(tangent, up).normalize();
    const normal = new THREE.Vector3().crossVectors(binormal, tangent).normalize();

    // Rotate binormal/normal around tangent by twistAngle
    const cos = Math.cos(twistAngle), sin = Math.sin(twistAngle);
    const ribbonDir = new THREE.Vector3(
      binormal.x * cos + normal.x * sin,
      binormal.y * cos + normal.y * sin,
      binormal.z * cos + normal.z * sin
    ).normalize();

    // Width varies: wider near hit point
    const widthScale = 0.6 + 0.4 * Math.exp(-Math.pow(t - 0.57, 2) / 0.1);
    const w = halfWidth * widthScale;

    // Two vertices per segment (left and right edge of ribbon)
    positions.push(
      point.x - ribbonDir.x * w, point.y - ribbonDir.y * w, point.z - ribbonDir.z * w,
      point.x + ribbonDir.x * w, point.y + ribbonDir.y * w, point.z + ribbonDir.z * w
    );
    tAttrs.push(t, t);

    if (i < segments) {
      const base = i * 2;
      indices.push(base, base + 1, base + 2);
      indices.push(base + 1, base + 3, base + 2);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('aT', new THREE.Float32BufferAttribute(tAttrs, 1));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

const ribbonGeo = buildRibbonGeometry(wristCurve, 120, 0.06);
const ribbonMat = new THREE.ShaderMaterial({
  uniforms: { uProgress: { value: 1.0 } },
  vertexShader: `
    attribute float aT;
    varying float vT;
    varying vec3 vNormal;
    void main() {
      vT = aT;
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uProgress;
    varying float vT;
    varying vec3 vNormal;
    void main() {
      if (vT > uProgress) discard;
      float speed = exp(-pow(vT - 0.57, 2.0) / 0.08);
      vec3 color;
      if (speed < 0.5) {
        float s = speed / 0.5;
        color = vec3(s, 0.75 + s * 0.15, 0.2 * (1.0 - s));
      } else {
        float s = (speed - 0.5) / 0.5;
        color = vec3(1.0, 0.9 - s * 0.7, 0.0);
      }
      // Subtle shading based on normal for silk-like look
      float light = 0.5 + 0.5 * abs(dot(vNormal, vec3(0.3, 0.8, 0.5)));
      gl_FragColor = vec4(color * light, 0.85);
    }
  `,
  transparent: true, side: THREE.DoubleSide, depthTest: true, depthWrite: true
});
const ribbonMesh = new THREE.Mesh(ribbonGeo, ribbonMat);
ribbonMesh.renderOrder = 1;
ribbonMesh.visible = false;
scene.add(ribbonMesh);

// Ribbon shell (same shape, dim gray, always fully visible)
const ribbonShellGeo = buildRibbonGeometry(wristCurve, 120, 0.065);
const ribbonShellMat = new THREE.MeshLambertMaterial({ color: 0x888888, transparent: true, opacity: 0.2, side: THREE.DoubleSide, depthWrite: false });
const ribbonShellMesh = new THREE.Mesh(ribbonShellGeo, ribbonShellMat);
ribbonShellMesh.renderOrder = 0;
ribbonShellMesh.visible = false;
scene.add(ribbonShellMesh);

// Track current style
let currentStyle = 'tube'; // 'tube' or 'ribbon'

// Hit point markers
const hitMarkers = {};

// A: 光环 (Torus ring)
const ringGeo = new THREE.TorusGeometry(0.055, 0.008, 12, 32);
const ringMat = new THREE.MeshBasicMaterial({ color: 0xccff00, transparent: true, opacity: 0.8 });
hitMarkers.ring = new THREE.Mesh(ringGeo, ringMat);
hitMarkers.ring.position.copy(hitPoint);
scene.add(hitMarkers.ring);

// B: 准星 (Crosshair — lines + outer ring)
const crossGroup = new THREE.Group();
const crossMat = new THREE.LineBasicMaterial({ color: 0xccff00, transparent: true, opacity: 0.85 });
const armLen = 0.06;
const gap = 0.02;
[
  [[-armLen, 0, 0], [-gap, 0, 0]], [[gap, 0, 0], [armLen, 0, 0]],
  [[0, -armLen, 0], [0, -gap, 0]], [[0, gap, 0], [0, armLen, 0]]
].forEach(([a, b]) => {
  const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...a), new THREE.Vector3(...b)]);
  crossGroup.add(new THREE.Line(g, crossMat));
});
const outerRingGeo = new THREE.TorusGeometry(0.05, 0.004, 8, 24);
const outerRingMat = new THREE.MeshBasicMaterial({ color: 0xccff00, transparent: true, opacity: 0.7 });
crossGroup.add(new THREE.Mesh(outerRingGeo, outerRingMat));
crossGroup.position.copy(hitPoint);
hitMarkers.cross = crossGroup;
crossGroup.visible = false;
scene.add(crossGroup);

// C: 星芒 (Starburst — radial lines)
const starGroup = new THREE.Group();
const starMat = new THREE.LineBasicMaterial({ color: 0xccff00, transparent: true, opacity: 0.85 });
const starRays = 6;
const starInner = 0.015;
const starOuter = 0.065;
for (let i = 0; i < starRays; i++) {
  const angle = (i / starRays) * Math.PI * 2;
  const cos = Math.cos(angle), sin = Math.sin(angle);
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(cos * starInner, sin * starInner, 0),
    new THREE.Vector3(cos * starOuter, sin * starOuter, 0)
  ]);
  starGroup.add(new THREE.Line(g, starMat));
}
starGroup.position.copy(hitPoint);
hitMarkers.star = starGroup;
starGroup.visible = false;
scene.add(starGroup);

hitMarker = hitMarkers.ring;

// Tennis ball (for animation)
const ballGeo = new THREE.SphereGeometry(0.033, 16, 16);
const ballMat = new THREE.MeshPhongMaterial({ color: 0xccff00, shininess: 60 });
const tennisBall = new THREE.Mesh(ballGeo, ballMat);
tennisBall.visible = false;
scene.add(tennisBall);

// Load human model
const loader = new OBJLoader();
loader.load('models/trophy-pose-low.obj', (obj) => {
  const mat = new THREE.MeshPhongMaterial({ color: 0x9a9a9a, transparent: true, opacity: 0.85, shininess: 40 });
  obj.traverse((child) => { if (child.isMesh) child.material = mat; });
  obj.position.set(0.030, 0.000, 0.220);
  obj.scale.set(0.680, 0.680, 0.680);
  obj.rotation.set(0.010, 0.000, 0.020);
  scene.add(obj);
});

// ============ OrbitControls ============
controls = new OrbitControls(camera, canvas);
controls.target.copy(sceneCenter);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enableZoom = true;
controls.minDistance = 1.0;
controls.maxDistance = 5.0;
// No looking up from below
controls.maxPolarAngle = Math.PI / 2;
controls.minPolarAngle = 0.1;

// Initial camera position: front-right, medium height
camera.position.set(sceneCenter.x + 0.8, sceneCenter.y + 0.8, sceneCenter.z + 2.5);
controls.update();

// ============ Ball Animation ============
const BALL_HIT_T = 0.57; // 对齐轨迹击球点 hitParamT
const BALL_FLY_END_T = 0.95; // 飞出时间拉长，让用户看清球飞出过程
const BALL_TOSS_START = new THREE.Vector3(0.05, 2.8, 0.1);
const BALL_FLY_END = new THREE.Vector3(0.3, 0.6, 5.5);

// Second ball for "fly" in "both" mode
const flyBallGeo = new THREE.SphereGeometry(0.033, 16, 16);
const flyBallMat = new THREE.MeshPhongMaterial({ color: 0xccff00, shininess: 60 });
const flyBall = new THREE.Mesh(flyBallGeo, flyBallMat);
flyBall.visible = false;
scene.add(flyBall);

let markerStyle = 'ball'; // 'ball' | 'ring' | 'cross' | 'star' | 'none'
let ballFly = true; // whether ball flies out after hit

function updateTennisBall(progress) {
  if (!isPlaying && !isDragging) {
    tennisBall.visible = false;
    flyBall.visible = false;
    return;
  }
  if (progress < 0.01) {
    tennisBall.visible = false;
    flyBall.visible = false;
    return;
  }

  // Before hit: ball falls toward hit point (always)
  if (progress < BALL_HIT_T) {
    tennisBall.visible = true;
    flyBall.visible = false;
    const t = progress / BALL_HIT_T;
    const eased = t * t;
    tennisBall.position.lerpVectors(BALL_TOSS_START, hitPoint, eased);
    tennisBall.scale.setScalar(1);
    return;
  }

  // After hit — marker=ball means ball stays at hit point as the marker
  const ballStays = markerStyle === 'ball';

  if (ballStays) {
    // tennisBall stays at hit point as marker
    tennisBall.visible = true;
    tennisBall.position.copy(hitPoint);
    tennisBall.scale.setScalar(1);
    // flyBall handles the fly-out
    if (ballFly && progress < BALL_FLY_END_T) {
      flyBall.visible = true;
      const t = (progress - BALL_HIT_T) / (BALL_FLY_END_T - BALL_HIT_T);
      const eased = 1 - Math.pow(1 - t, 2);
      flyBall.position.lerpVectors(hitPoint, BALL_FLY_END, eased);
      flyBall.scale.setScalar(1 - eased * 0.6);
    } else {
      flyBall.visible = false;
    }
  } else {
    // No ball-as-marker; tennisBall is used for fly-out if enabled
    if (ballFly) {
      flyBall.visible = false;
      if (progress < BALL_FLY_END_T) {
        tennisBall.visible = true;
        const t = (progress - BALL_HIT_T) / (BALL_FLY_END_T - BALL_HIT_T);
        const eased = 1 - Math.pow(1 - t, 2);
        tennisBall.position.lerpVectors(hitPoint, BALL_FLY_END, eased);
        tennisBall.scale.setScalar(1 - eased * 0.6);
      } else {
        tennisBall.visible = false;
      }
    } else {
      tennisBall.visible = false;
      flyBall.visible = false;
    }
  }
}

// ============ Animation Loop ============
function animLoop(time) {
  requestAnimationFrame(animLoop);

  if (isPlaying) {
    const dt = time - lastTime;
    animProgress += (dt / ANIM_DURATION) * playbackRate;
    if (animProgress >= 1) {
      animProgress = 0;
      fillMat.uniforms.uProgress.value = 0.0;
      ribbonMat.uniforms.uProgress.value = 0.0;
    }
  }
  lastTime = time;

  // Update trajectory fill (playing or dragging) — linear, no pause
  if (isPlaying || isDragging) {
    const fillVal = animProgress;
    fillMat.uniforms.uProgress.value = fillVal;
    ribbonMat.uniforms.uProgress.value = fillVal;
  }

  // Hit markers (ring/cross/star) — only when markerStyle is one of them
  {
    const showGeomMarker = (markerStyle === 'ring' || markerStyle === 'cross' || markerStyle === 'star')
      && ((!isPlaying && !isDragging) || animProgress >= BALL_HIT_T);
    const pulse = 0.5 + 0.5 * Math.sin(time * 0.004);
    const s = 0.9 + 0.15 * pulse;
    Object.entries(hitMarkers).forEach(([key, marker]) => {
      if (key === markerStyle && showGeomMarker) {
        marker.visible = true;
        marker.scale.set(s, s, s);
        if (key === 'star') marker.rotation.z = time * 0.001;
        if (marker.material) marker.material.opacity = 0.5 + 0.4 * pulse;
      } else {
        marker.visible = false;
      }
    });
  }

  // Tennis ball
  updateTennisBall(animProgress);

  // Update playbar UI
  updatePlaybarUI();

  controls.update();
  renderer.render(scene, camera);
}

requestAnimationFrame(animLoop);

// ============ Speed Display ============
const PEAK_SPEED = 189;
const MIN_SPEED = 35;
function getSpeedAtProgress(progress) {
  const peak = Math.exp(-Math.pow(progress - 0.57, 2) / 0.03);
  return Math.round(MIN_SPEED + (PEAK_SPEED - MIN_SPEED) * peak);
}

function getSpeedColor(progress) {
  const speedNorm = Math.exp(-Math.pow(progress - 0.57, 2) / 0.08);
  let r, g, b;
  if (speedNorm < 0.5) {
    const s = speedNorm / 0.5;
    r = s; g = 0.75 + s * 0.15; b = 0.2 * (1 - s);
  } else {
    const s = (speedNorm - 0.5) / 0.5;
    r = 1.0; g = 0.9 - s * 0.7; b = 0.0;
  }
  return `rgb(${Math.round(r*255)}, ${Math.round(g*255)}, ${Math.round(b*255)})`;
}

function updateSpeedOverlay() {
  const el = document.getElementById('speed-value');
  const speed = getSpeedAtProgress(animProgress);
  el.textContent = speed;
  el.style.color = getSpeedColor(animProgress);
}

// ============ Playbar UI ============
function updatePlaybarUI() {
  const fill = document.getElementById('playbar-fill');
  const thumb = document.getElementById('playbar-thumb');
  const timeEl = document.getElementById('playbar-time');
  const pct = animProgress * 100;
  fill.style.width = pct + '%';
  thumb.style.left = pct + '%';
  const totalSec = Math.round(ANIM_DURATION / 1000 / playbackRate);
  const curSec = Math.round(animProgress * totalSec);
  const fmt = (s) => `00:${String(s).padStart(2,'0')}`;
  timeEl.textContent = `${fmt(curSec)} / ${fmt(totalSec)}`;
  updateSpeedOverlay();
}

// ============ Play Button ============
document.getElementById('play-btn').addEventListener('click', () => {
  if (isPlaying) {
    isPlaying = false;
    document.getElementById('play-btn').classList.remove('playing');
  } else {
    if (animProgress >= 1) animProgress = 0;
    fillMat.uniforms.uProgress.value = 0.0;
    ribbonMat.uniforms.uProgress.value = 0.0;
    isPlaying = true;
    lastTime = performance.now();
    document.getElementById('play-btn').classList.add('playing');
  }
});

// ============ Draggable Progress Bar ============
const progressBar = document.getElementById('playbar-progress');

function seekTo(clientX) {
  const rect = progressBar.getBoundingClientRect();
  let ratio = (clientX - rect.left) / rect.width;
  ratio = Math.max(0, Math.min(1, ratio));
  animProgress = ratio;
  fillMat.uniforms.uProgress.value = animProgress;
  ribbonMat.uniforms.uProgress.value = animProgress;
  updatePlaybarUI();
}

progressBar.addEventListener('pointerdown', (e) => {
  isDragging = true;
  isPlaying = false;
  document.getElementById('play-btn').classList.remove('playing');
  progressBar.setPointerCapture(e.pointerId);
  seekTo(e.clientX);
});
progressBar.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  seekTo(e.clientX);
});
progressBar.addEventListener('pointerup', () => { isDragging = false; });
progressBar.addEventListener('pointercancel', () => { isDragging = false; });

// ============ Court Toggle ============
document.getElementById('btn-court-toggle').addEventListener('click', (e) => {
  const btn = e.currentTarget;
  const showing = btn.classList.toggle('active');
  courtGroup.visible = showing;
});

// ============ Style Toggle ============
document.querySelectorAll('[data-style]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-style]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStyle = btn.dataset.style;
    if (currentStyle === 'ribbon') {
      shellMesh.visible = false;
      fillMesh.visible = false;
      ribbonMesh.visible = true;
      ribbonShellMesh.visible = true;
    } else {
      shellMesh.visible = true;
      fillMesh.visible = true;
      ribbonMesh.visible = false;
      ribbonShellMesh.visible = false;
    }
  });
});

// ============ Playback Rate ============
const RATES = [0.25, 0.5, 1, 1.5, 2];
let rateIndex = 2; // default 1x
document.getElementById('rate-btn').addEventListener('click', () => {
  rateIndex = (rateIndex + 1) % RATES.length;
  playbackRate = RATES[rateIndex];
  document.getElementById('rate-btn').textContent = playbackRate === 1 ? '1x' : playbackRate + 'x';
});

// ============ Marker Style Toggle ============
function updateMarkerConstraints() {
  // 球飞出时：不能选"网球"（两球不共存）
  // 球不飞出时：不能选"无"（否则啥都看不到）
  document.querySelectorAll('[data-marker]').forEach(b => {
    if (ballFly && b.dataset.marker === 'ball') {
      b.disabled = true; b.style.opacity = '0.3'; b.style.pointerEvents = 'none';
    } else if (!ballFly && b.dataset.marker === 'none') {
      b.disabled = true; b.style.opacity = '0.3'; b.style.pointerEvents = 'none';
    } else {
      b.disabled = false; b.style.opacity = ''; b.style.pointerEvents = '';
    }
  });
}

document.querySelectorAll('[data-marker]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.disabled) return;
    document.querySelectorAll('[data-marker]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    markerStyle = btn.dataset.marker;
  });
});

// ============ Ball Fly Toggle ============
document.querySelectorAll('[data-fly]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-fly]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ballFly = btn.dataset.fly === 'yes';
    // 切换后检查当前标记是否冲突，自动修正
    if (ballFly && markerStyle === 'ball') {
      markerStyle = 'ring';
      document.querySelectorAll('[data-marker]').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-marker="ring"]').classList.add('active');
    } else if (!ballFly && markerStyle === 'none') {
      markerStyle = 'ball';
      document.querySelectorAll('[data-marker]').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-marker="ball"]').classList.add('active');
    }
    updateMarkerConstraints();
  });
});
updateMarkerConstraints();
</script>
